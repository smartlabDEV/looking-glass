# ExaBGP konfig — peer mot Huawei NE8000
# ExaBGP kjøres i egen Docker-container
# og snakker eBGP/iBGP med NE8000

process bgp-controller {
    run /usr/bin/python3 /app/ml/exabgp/controller.py;
    encoder json;
}

neighbor 10.0.0.1 {
    # TODO: Fyll inn NE8000 management IP
    description "NE8000-Oslo-1";
    router-id 10.0.0.100;
    local-address 10.0.0.100;
    local-as 65000;         # TODO: Din AS
    peer-as 65000;          # TODO: NE8000 AS (iBGP)

    family {
        ipv4 unicast;
    }

    api {
        processes [ bgp-controller ];
    }
}
